<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>染整数据录入系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%); min-height: 100vh; }
        .card { border-radius: 14px; border: none; }
        .formset-table input, .formset-table select, .formset-table textarea { min-width: 120px; }
        textarea { width: 100%; }
        .industrial-nav { background: linear-gradient(90deg, #0f172a, #1e293b); box-shadow: 0 8px 24px rgba(15,23,42,.35); }
        .navbar .nav-link { color: #cbd5e1 !important; }
        .navbar .nav-link:hover { color: #22d3ee !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg industrial-nav mb-4">
    <div class="container">
        <a class="navbar-brand text-light fw-bold" href="/">染整数据录入系统</a>
        <div class="navbar-nav me-auto">
            <a class="nav-link" href="/">批次列表</a>
            <a class="nav-link" href="/batch/add/">新建批次</a>
            <a class="nav-link" href="/import/">Excel导入</a>
            <a class="nav-link" href="/vue-entry/">Vue录入台</a>
            <a class="nav-link" href="/admin/">管理后台</a>
        </div>
        <div class="d-flex align-items-center gap-2">
            {% if request.user.is_authenticated %}
                <span class="badge text-bg-secondary">{{ request.user.username }}</span>
                <form method="post" action="{% url 'logout' %}" class="m-0">
                    {% csrf_token %}
                    <button class="btn btn-sm btn-outline-light" type="submit">退出</button>
                </form>
            {% else %}
                <a class="btn btn-sm btn-outline-light" href="{% url 'login' %}">登录</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container pb-5">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }} shadow-sm">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
