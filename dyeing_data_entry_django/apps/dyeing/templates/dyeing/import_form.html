{% extends 'dyeing/base.html' %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-header">Excel导入</div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">开始导入</button>
            <a href="{% url 'dyeing:batch_list' %}" class="btn btn-secondary">返回</a>
        </form>
        <hr>
        <p class="text-muted mb-0">
            支持与你上传模板相同的 sheet 结构：批次主表、化学品表、工艺时序表、环境设备表、结果表。
        </p>
    </div>
</div>
{% endblock %}
