<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - 染整数据录入系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { min-height:100vh; background: radial-gradient(circle at top, #1e293b, #0f172a 55%, #020617); }
    .login-box {
      background: rgba(15,23,42,.85);
      border: 1px solid rgba(148,163,184,.25);
      border-radius: 16px;
      box-shadow: 0 20px 45px rgba(2,6,23,.45);
      color: #e2e8f0;
    }
    .form-control { background:#0b1220; border-color:#334155; color:#e2e8f0; }
    .form-control:focus { border-color:#22d3ee; box-shadow:0 0 0 .2rem rgba(34,211,238,.2); background:#0b1220; color:#fff; }
  </style>
</head>
<body class="d-flex align-items-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="login-box p-4 p-md-5">
          <p class="text-info text-uppercase small mb-2">Dyeing Input Secure Access</p>
          <h3 class="mb-4">系统登录</h3>
          {% if form.errors %}
            <div class="alert alert-danger">用户名或密码错误，请重试。</div>
          {% endif %}
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">用户名</label>
              <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-4">
              <label class="form-label">密码</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <button class="btn btn-info w-100 fw-semibold" type="submit">登录进入</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
