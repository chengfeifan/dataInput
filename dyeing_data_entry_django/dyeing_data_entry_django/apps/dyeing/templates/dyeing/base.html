<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>染整数据录入系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f7f8fa; }
        .card { border-radius: 14px; }
        .formset-table input, .formset-table select, .formset-table textarea { min-width: 120px; }
        textarea { width: 100%; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">染整数据录入系统</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">批次列表</a>
            <a class="nav-link" href="/batch/add/">新建批次</a>
            <a class="nav-link" href="/import/">Excel导入</a>
            <a class="nav-link" href="/admin/">管理后台</a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
